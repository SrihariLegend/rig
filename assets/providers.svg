    <tspan x="240" fill="#6b7394">Claude Opus 4.7, Opus 4.6, Sonnet 4.6, Haiku 4.5</tspan>
    <tspan x="640" fill="#3d4259">API key</tspan>
  </text>
  <text y="178" font-size="12">
