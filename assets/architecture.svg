<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
  </defs>

  <rect width="840" height="380" rx="12" fill="url(#bg)"/>
  <rect width="840" height="36" rx="12" fill="#0d1017"/>
  <rect y="24" width="840" height="12" fill="#0d1017"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="420" y="22" text-anchor="middle" font-size="12" fill="#5a6078">architecture</text>

  <!-- Main box -->
  <rect x="60" y="52" width="720" height="270" rx="4" fill="none" stroke="#2a2f42" stroke-width="1"/>
  <text x="420" y="72" text-anchor="middle" font-size="13" fill="#c8a44e">rig</text>
  <text x="420" y="88" text-anchor="middle" font-size="10" fill="#3d4259">566KB binary · 23K lines of C</text>

  <!-- Three columns -->
  <rect x="80" y="100" width="200" height="80" rx="4" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>
  <rect x="300" y="100" width="200" height="80" rx="4" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>
  <rect x="520" y="100" width="240" height="80" rx="4" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>

  <text x="180" y="122" text-anchor="middle" font-size="12" fill="#c8a44e">rig-ai</text>
  <text x="180" y="140" text-anchor="middle" font-size="10" fill="#6b7394">providers</text>
  <text x="180" y="154" text-anchor="middle" font-size="10" fill="#6b7394">streaming</text>
  <text x="180" y="168" text-anchor="middle" font-size="10" fill="#6b7394">transform</text>

  <text x="400" y="122" text-anchor="middle" font-size="12" fill="#c8a44e">rig-agent</text>
  <text x="400" y="140" text-anchor="middle" font-size="10" fill="#6b7394">loop</text>
  <text x="400" y="154" text-anchor="middle" font-size="10" fill="#6b7394">tool dispatch</text>

  <text x="640" y="122" text-anchor="middle" font-size="12" fill="#c8a44e">rig-harness</text>
  <text x="640" y="140" text-anchor="middle" font-size="10" fill="#6b7394">tools, sessions</text>
  <text x="640" y="154" text-anchor="middle" font-size="10" fill="#6b7394">permissions</text>
  <text x="640" y="168" text-anchor="middle" font-size="10" fill="#6b7394">extensions</text>

  <!-- TUI bar -->
  <rect x="80" y="196" width="680" height="44" rx="4" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>
  <text x="420" y="218" text-anchor="middle" font-size="12" fill="#c8a44e">rig-tui</text>
  <text x="420" y="232" text-anchor="middle" font-size="10" fill="#6b7394">lantern · markdown · scrollback</text>

  <!-- Extensions bar -->
  <rect x="80" y="256" width="680" height="44" rx="4" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>
  <text x="420" y="278" text-anchor="middle" font-size="12" fill="#c8a44e">lua extensions</text>
  <text x="420" y="292" text-anchor="middle" font-size="10" fill="#6b7394">8 primitives · sandboxed</text>

  <!-- Source tree -->
  <text x="80" y="346" font-size="11">
    <tspan fill="#5a6078">src/</tspan>
    <tspan fill="#3d4259" dx="12">ai/  agent/  harness/  tui/  util/</tspan>
  </text>
  <text x="80" y="366" font-size="10" fill="#3d4259">No generated code. Every subsystem fits in your head.</text>
</svg>
