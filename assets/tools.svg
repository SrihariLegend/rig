<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
  </defs>

  <rect width="840" height="340" rx="12" fill="url(#bg)"/>
  <rect width="840" height="36" rx="12" fill="#0d1017"/>
  <rect y="24" width="840" height="12" fill="#0d1017"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="420" y="22" text-anchor="middle" font-size="12" fill="#5a6078">/tools</text>

  <text x="30" y="68" font-size="13">
    <tspan fill="#5a9bcf">you</tspan>
    <tspan fill="#8b92a8" dx="12">/tools</tspan>
  </text>

  <text x="30" y="100" font-size="13" fill="#c8a44e">rig</text>
  <text x="75" y="100" font-size="12" fill="#8b92a8">7 tools available:</text>

  <text y="130" font-size="12">
    <tspan x="75" fill="#c8a44e">bash</tspan>
    <tspan x="230" fill="#6b7394">Execute shell commands with timeout and output capture</tspan>
  </text>
  <text y="154" font-size="12">
    <tspan x="75" fill="#c8a44e">read</tspan>
    <tspan x="230" fill="#6b7394">Read files with line numbers, offsets, and limits</tspan>
  </text>
  <text y="178" font-size="12">
    <tspan x="75" fill="#c8a44e">write</tspan>
    <tspan x="230" fill="#6b7394">Create or overwrite files</tspan>
  </text>
  <text y="202" font-size="12">
    <tspan x="75" fill="#c8a44e">edit</tspan>
    <tspan x="230" fill="#6b7394">Surgical find-and-replace edits</tspan>
  </text>
  <text y="226" font-size="12">
    <tspan x="75" fill="#c8a44e">grep</tspan>
    <tspan x="230" fill="#6b7394">Regex search across files</tspan>
  </text>
  <text y="250" font-size="12">
    <tspan x="75" fill="#c8a44e">ls</tspan>
    <tspan x="230" fill="#6b7394">List directory contents</tspan>
  </text>
  <text y="274" font-size="12">
    <tspan x="75" fill="#c8a44e">introspect</tspan>
    <tspan x="230" fill="#6b7394">Query rig's own state (tools, config, extensions)</tspan>
  </text>

  <text x="75" y="310" font-size="11" fill="#3d4259">Every tool has permissions. Rig asks before writing or running commands.</text>
</svg>
