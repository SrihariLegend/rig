<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c8a44e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8a44e" stop-opacity="0"/>
    </linearGradient>
    <filter id="lantern">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="440" rx="12" fill="url(#bg)"/>

  <!-- Window chrome -->
  <rect width="840" height="36" rx="12" fill="#0d1017"/>
  <rect y="24" width="840" height="12" fill="#0d1017"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="420" y="22" text-anchor="middle" font-size="12" fill="#5a6078">rig v0.1.0</text>

  <!-- Lantern glow effect -->
  <ellipse cx="420" cy="200" rx="300" ry="200" fill="url(#glow)"/>

  <!-- Session bar -->
  <text x="30" y="68" font-size="11" fill="#3d4259">session: 7f3a2c1  ·  claude-opus-4-6 (bedrock)  ·  /help for commands</text>

  <!-- User prompt -->
  <text x="30" y="110" font-size="13">
    <tspan fill="#5a9bcf">you</tspan>
    <tspan fill="#8b92a8" dx="12">Why should I use rig?</tspan>
  </text>

  <!-- Rig response -->
  <text x="30" y="148" font-size="13">
    <tspan fill="#c8a44e">rig</tspan>
  </text>

  <!-- Comparison box -->
  <rect x="70" y="162" width="700" height="190" rx="6" fill="#12151f" stroke="#2a2f42" stroke-width="1"/>

  <!-- Headers -->
  <text x="100" y="188" font-size="12" fill="#5a6078">Other tools</text>
  <text x="380" y="188" font-size="12" fill="#c8a44e">Rig</text>

  <!-- Separator line -->
  <line x1="90" y1="196" x2="740" y2="196" stroke="#2a2f42" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="100" y="218" font-size="12" fill="#6b7394">Electron / Node / Python</text>
  <text x="380" y="218" font-size="12" fill="#a8b4c4">Single C binary, 566KB</text>

  <!-- Row 2 -->
  <text x="100" y="244" font-size="12" fill="#6b7394">1-2 GB installed</text>
  <text x="380" y="244" font-size="12" fill="#a8b4c4">Zero runtime dependencies</text>

  <!-- Row 3 -->
  <text x="100" y="270" font-size="12" fill="#6b7394">One LLM provider</text>
  <text x="380" y="270" font-size="12" fill="#a8b4c4">Anthropic, OpenAI, Google, Bedrock,</text>
  <text x="380" y="288" font-size="12" fill="#a8b4c4">Mistral, DeepSeek, xAI, Groq</text>

  <!-- Row 4 -->
  <text x="100" y="314" font-size="12" fill="#6b7394">Plugin SDK + build step</text>
  <text x="380" y="314" font-size="12" fill="#a8b4c4">Drop a .lua file, done</text>

  <!-- Row 5 -->
  <text x="100" y="340" font-size="12" fill="#6b7394">Startup: seconds</text>
  <text x="380" y="340" font-size="12" fill="#a8b4c4">Startup: &lt;1ms</text>

  <!-- Bottom prompt -->
  <text x="30" y="395" font-size="13">
    <tspan fill="#5a9bcf">you</tspan>
    <tspan fill="#3d4259" dx="12">█</tspan>
  </text>

  <!-- Stats bar -->
  <text x="30" y="425" font-size="10" fill="#2a2f42">23K lines of C  ·  MIT license  ·  every subsystem fits in your head</text>
</svg>
