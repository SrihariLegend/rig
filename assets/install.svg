<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 220" font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141821"/>
    </linearGradient>
  </defs>

  <rect width="840" height="220" rx="12" fill="url(#bg)"/>
  <rect width="840" height="36" rx="12" fill="#0d1017"/>
  <rect y="24" width="840" height="12" fill="#0d1017"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="420" y="22" text-anchor="middle" font-size="12" fill="#5a6078">install</text>

  <text x="30" y="68" font-size="12">
    <tspan fill="#5a6078">$</tspan>
    <tspan fill="#a8b4c4" dx="8">curl -fsSL https://raw.githubusercontent.com/SrihariLegend/rig/main/install.sh | sh</tspan>
  </text>
  <text x="30" y="92" font-size="12">
    <tspan fill="#5a6078">$</tspan>
    <tspan fill="#a8b4c4" dx="8">rig auth</tspan>
  </text>
  <text x="30" y="116" font-size="12">
    <tspan fill="#5a6078">$</tspan>
    <tspan fill="#a8b4c4" dx="8">rig</tspan>
  </text>

  <line x1="30" y1="134" x2="810" y2="134" stroke="#2a2f42" stroke-width="1"/>

  <text y="160" font-size="11">
    <tspan x="30" fill="#5a6078">build deps</tspan>
    <tspan x="200" fill="#6b7394">C compiler, libcurl-dev, libssl-dev, zlib-dev</tspan>
  </text>
  <text y="180" font-size="11">
    <tspan x="30" fill="#5a6078">runtime</tspan>
    <tspan x="200" fill="#6b7394">libcurl, libssl, zlib (on virtually every Linux box)</tspan>
  </text>
  <text y="200" font-size="11">
    <tspan x="30" fill="#5a6078">vendored</tspan>
    <tspan x="200" fill="#6b7394">Lua 5.4, cJSON, libyaml, md4c (zero install)</tspan>
  </text>
</svg>
